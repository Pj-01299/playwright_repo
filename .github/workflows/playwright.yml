name: Playwright Allure Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --reporter=line,allure-playwright
      env:
        ALLURE_RESULTS_DIR: allure-results

    - name: Upload Allure Results (Shard)
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.shardIndex }}
        path: allure-results
        retention-days: 1

  merge-allure-reports:
    needs: [playwright-tests]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Download all Shard Results
      uses: actions/download-artifact@v4
      with:
        path: all-allure-results
        pattern: allure-results-*
        merge-multiple: true

    - name: Build Allure Report
      # This command takes the raw JSONs and converts them to a viewable HTML folder
      run: npx allure generate all-allure-results --clean -o allure-report

    - name: Upload Final Allure HTML Report
      uses: actions/upload-artifact@v4
      with:
        name: final-allure-report
        path: allure-report
        retention-days: 7
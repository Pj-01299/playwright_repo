name: Playwright Allure Tests
on:
  push:
    branches: [ main, master ]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    # ALLURE REQUIREMENT: Ensure you have allure-playwright installed in package.json
    - name: Run Playwright tests
      run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --reporter=line,allure-playwright
      env:
        ALLURE_RESULTS_DIR: allure-results # Forces shards to use the same folder name

    - name: Upload Allure Results (Shard)
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.shardIndex }}
        path: allure-results
        retention-days: 1

  merge-allure-reports:
    needs: [playwright-tests]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*

    - name: Download all Shard Results
      uses: actions/download-artifact@v4
      with:
        path: all-allure-results
        pattern: allure-results-*
        merge-multiple: true # This combines all 4 shard folders into ONE folder

    - name: Load Allure history
      uses: actions/checkout@v5
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Build Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: all-allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report